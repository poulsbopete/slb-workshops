title: SLB × Elastic Workshops
teaser: |
  Hands-on enablement for SLB SRE — Elastic Observability Serverless labs aligned to the
  July–November 2026 workshop series.
description: |-
  **SLB × Elastic Workshop Program**

  Self-paced Instruqt labs for the SLB SRE enablement series. Each live session at
  [events.elastic.co/slbworkshops](https://events.elastic.co/slbworkshops) has a matching
  hands-on track in this collection.

  ## Phase 1 — Foundations (July 2026)
  - **F-02** Intro to Elastic → `slb-f-02-intro-to-elastic`
  - **F-03** Elastic Day to Day → `slb-f-03-elastic-day-to-day`

  ## Phase 2 — SME Tracks (Aug–Nov 2026)
  - **Developers** — UI, ES|QL, deployment validation
  - **SRE & Infra Ops** — platform ops, ILM, ingestion, production readiness
  - **BI / Analysts** — Discover, ES|QL, APIs & dashboards
  - **AIOps & Alerting** — noise reduction, AI-assisted investigation

  ## This track
  Start with **Program overview**, then explore the **Database Monitoring** reference lab
  (OpenTelemetry for six database engines).

  Source: [github.com/poulsbopete/slb-workshops](https://github.com/poulsbopete/slb-workshops)
